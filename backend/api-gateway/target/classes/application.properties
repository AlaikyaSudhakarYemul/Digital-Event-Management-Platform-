spring.application.name=API-GATEWAY
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*

spring.cloud.gateway.routes[0].id=auth-routes
spring.cloud.gateway.routes[0].uri=lb://DEMP
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=user-routes
spring.cloud.gateway.routes[1].uri=lb://DEMP
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/user/**

spring.cloud.gateway.routes[2].id=event-routes
spring.cloud.gateway.routes[2].uri=lb://EVENT
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/events/**

spring.cloud.gateway.routes[3].id=registration-routes
spring.cloud.gateway.routes[3].uri=lb://EVENT
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/registrations/**

spring.cloud.gateway.routes[4].id=admin-routes
spring.cloud.gateway.routes[4].uri=lb://ADMIN
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/admin/**

spring.cloud.gateway.routes[5].id=speaker-routes
spring.cloud.gateway.routes[5].uri=lb://ADMIN
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/speakers/**

spring.cloud.gateway.routes[6].id=payment-routes
spring.cloud.gateway.routes[6].uri=lb://PAYMENT
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/payments/**

spring.cloud.gateway.routes[7].id=ai-routes
spring.cloud.gateway.routes[7].uri=lb://DEMP
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/ai/**
