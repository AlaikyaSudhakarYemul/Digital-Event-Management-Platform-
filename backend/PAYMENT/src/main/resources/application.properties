spring.application.name=PAYMENT

server.port=8084

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${PAYMENT_DB_URL:jdbc:mysql://localhost:3306/payment_db?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${PAYMENT_DB_USERNAME:root}
spring.datasource.password=${PAYMENT_DB_PASSWORD:root123}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
